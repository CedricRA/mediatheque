<app-media-filters (filtersChange)="filters.set($event)" />
<p>{{ count() }} résultat(s)</p>

<button (click)="openAddDialog()">
  Ajouter un média
</button>

<div class="media-grid">
  @for (media of filteredMedias(); track media.id) {
    <div (click)="goToDetail(media.id)" class="media-card">
      <div class="card-header">
        <h3>{{ media.title }}</h3>
      </div>

      <div class="card-content">
        <p class="type">{{ typeLabels[media.type] }}</p>
        <p class="creator">{{ media.creator }}</p>

        <p class="status">
          {{ statusLabels[media.status] }}
        </p>

        @if (media.rating) {
          <div class="stars">
            @for (star of [1, 2, 3, 4, 5]; track star) {
              <span class="star" [class.active]="star <= media.rating">★</span>
            }
          </div>
        }
      </div>

      <div class="card-footer">
        <div class="actions">
          <button (click)="goToDetail(media.id); $event.stopPropagation()">👁️</button>
          <button (click)="edit(media.id); $event.stopPropagation()">✏️</button>
          <button (click)="delete(media.id); $event.stopPropagation()">❌</button>
        </div>
      </div>
    </div>
  }
</div>
