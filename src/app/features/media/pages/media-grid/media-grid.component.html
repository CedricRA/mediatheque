<app-media-filters (filtersChange)="filters.set($event)" />
<p>{{ count() }} résultat(s)</p>

<button (click)="openAddDialog()">
  Ajouter un média
</button>

<table class="media-table">
  <thead>
    <tr>
      <th>Titre</th>
      <th>Créateur</th>
      <th>Type</th>
      <th>Statut</th>
      <th>Note</th>
      <th>Actions</th>
    </tr>
  </thead>

  <tbody>
    @for (media of filteredMedias(); track media.id) {
      <tr (click)="goToDetail(media.id)" class="clickable-row">
        <td>{{ media.title }}</td>
        <td>{{ media.creator }}</td>
        <td>{{ typeLabels[media.type] }}</td>
        <td>{{ statusLabels[media.status] }}</td>

        <td>
          <div class="stars">
            @for (star of [1, 2, 3, 4, 5]; track star) {
              <span class="star" [class.active]="star <= (media.rating || 0)">★</span>
            }
          </div>
        </td>

        <td class="actions">
          <button (click)="goToDetail(media.id); $event.stopPropagation()">👁️</button>
          <button (click)="edit(media.id); $event.stopPropagation()">✏️</button>
          <button (click)="delete(media.id); $event.stopPropagation()">❌</button>
        </td>
      </tr>
    }
  </tbody>
</table>
